name: Build extension zips

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build per-browser manifests
        run: node tools/build.mjs

      - name: Create Chrome zip
        run: cd dist/chrome && zip -r ../../max_exporter_chrome.zip .

      - name: Create Firefox zip
        run: cd dist/firefox && zip -r ../../max_exporter_firefox.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            max_exporter_chrome.zip
            max_exporter_firefox.zip
          tag_name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

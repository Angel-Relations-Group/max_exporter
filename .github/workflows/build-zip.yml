name: Build Chrome extension zip

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT && echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          mkdir -p dist
          zip -r dist/max_exporter.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "dist/*" \
            -x "*.zip" \
            -x "node_modules/*" \
            -x ".DS_Store"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: max_exporter
          path: dist/max_exporter.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/max_exporter.zip
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}